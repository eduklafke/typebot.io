name: Build Typebot Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BUILDER_IMAGE: ghcr.io/${{ github.repository_owner }}/typebot-builder
  VIEWER_IMAGE: ghcr.io/${{ github.repository_owner }}/typebot-viewer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Builder
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/builder/Dockerfile
          push: true
          tags: |
            ${{ env.BUILDER_IMAGE }}:latest
            ${{ env.BUILDER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Viewer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/viewer/Dockerfile
          push: true
          tags: |
            ${{ env.VIEWER_IMAGE }}:latest
            ${{ env.VIEWER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
