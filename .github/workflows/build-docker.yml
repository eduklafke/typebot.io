name: Build Typebot Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: SCOPE=builder
          tags: |
            ghcr.io/${{ github.repository_owner }}/typebot-builder:latest
            ghcr.io/${{ github.repository_owner }}/typebot-builder:${{ github.sha }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

  build-viewer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: SCOPE=viewer
          tags: |
            ghcr.io/${{ github.repository_owner }}/typebot-viewer:latest
            ghcr.io/${{ github.repository_owner }}/typebot-viewer:${{ github.sha }}
          cache-from: type=gha,scope=viewer
          cache-to: type=gha,mode=max,scope=viewer
